name: q_ai_mob_testt
description: QuantMessage.Ai — Multi-Agent AI Messaging Hub
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ═══════════════════════════════════════════════════════════════════════════
  #  Environment variables
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_dotenv: ^5.2.1           # ← NEW: Load .env file for Supabase keys

  # ═══════════════════════════════════════════════════════════════════════════
  #  Networking & API
  # ═══════════════════════════════════════════════════════════════════════════
  dio: ^5.4.3+1
  http: ^1.2.0
  web_socket_channel: ^3.0.1         # Real-time AI streaming responses

  # ═══════════════════════════════════════════════════════════════════════════
  #  Supabase & Auth
  # ═══════════════════════════════════════════════════════════════════════════
  supabase_flutter: ^2.10.0          # ← CHANGED: Updated for new key format (sb_publishable_)

  # ═══════════════════════════════════════════════════════════════════════════
  #  State Management & Persistence
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3         # User memory & preferences
  flutter_secure_storage: ^9.2.4     # Secure JWT/auth tokens
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ═══════════════════════════════════════════════════════════════════════════
  #  UI / Aesthetics / Animations
  # ═══════════════════════════════════════════════════════════════════════════
  google_fonts: ^6.2.1               # Orbitron, Inter, JetBrains Mono, Outfit, Tinos
  flutter_markdown: ^0.7.4           # Rendering AI responses (latest stable)
  fl_chart: ^1.0.0                   # Analytics / charting views
  shimmer: ^3.0.0
  animate_do: ^3.3.4                 # Waterfall / Zoom splash effects
  lottie: ^3.1.2
  cached_network_image: ^3.4.1       # ← NEW: image caching for thumbnails/PDFs

  # ═══════════════════════════════════════════════════════════════════════════
  #  File / Image / PDF Handling
  # ═══════════════════════════════════════════════════════════════════════════
  image_picker: ^1.1.2               # Gallery + camera capture (bumped from 1.0.7)
  file_picker: ^8.1.4                # ← NEW: PDF & document picker
  syncfusion_flutter_pdfviewer: ^27.1.48  # ← NEW: in-chat PDF viewer
  mime: ^1.0.6                       # ← NEW: MIME type detection from filename

  # ═══════════════════════════════════════════════════════════════════════════
  #  Vision, Hardware & Permissions
  # ═══════════════════════════════════════════════════════════════════════════
  mobile_scanner: ^4.0.1             # QR code scanning
  permission_handler: ^11.3.1        # Camera / Gallery / Mic access
  record: ^5.1.2                     # ← NEW: voice input recording
  just_audio: ^0.9.40                # ← NEW: TTS playback
  speech_to_text: ^7.3.0

  # ═══════════════════════════════════════════════════════════════════════════
  #  Utilities
  # ═══════════════════════════════════════════════════════════════════════════
  intl: ^0.19.0                      # Date / currency formatting
  uuid: ^4.4.0                       # Unique session IDs
  jwt_decoder: ^2.0.1                # Decoding auth tokens
  path_provider: ^2.1.3              # Local cache management
  path: ^1.9.0                       # ← NEW: file path manipulation

  # ═══════════════════════════════════════════════════════════════════════════
  #  Firebase & Auth (Optional — kept for future Google/FB login)
  # ═══════════════════════════════════════════════════════════════════════════
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  # ═══════════════════════════════════════════════════════════════════════════
  #  Assets bundled with the app
  # ═══════════════════════════════════════════════════════════════════════════
  assets:
    - .env                            # ← NEW: required for Supabase keys
  # Uncomment when you add Lottie animations or custom images:
  # - assets/animations/
  # - assets/images/
